name: CI

on:
  push:
    branches:
      - "main"
  pull_request: {}

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test (${{ matrix.dotnet }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet:
          - 8.0.x
          - 9.0.x
          - 10.0.x
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup dotNet
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5.1.0
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - name: Restore
        run: dotnet restore test/WorkOSTests/WorkOSTests.csproj
      - name: Build
        run: |
          dotnet build -c Release src/WorkOS.net/WorkOS.net.csproj --no-restore
          dotnet build -c Release test/WorkOSTests/WorkOSTests.csproj --no-restore
      - name: Test
        run: dotnet test -c Release -f net8.0 --no-build test/WorkOSTests/WorkOSTests.csproj
        env:
          DOTNET_ROLL_FORWARD: Major
