name: Release

on:
  workflow_dispatch:
  release:
    types: [published]

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3
      - name: Setup DotNet
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # 5.3.0
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet pack -c Release src/WorkOS.net/WorkOS.net.csproj

      - name: NuGet login (trusted publishing)
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: workos

      - name: Publish
        run: dotnet nuget push src/WorkOS.net/bin/Release/WorkOS.net.*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
