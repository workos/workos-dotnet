name: Lint

on:
  push:
    branches:
      - main
  pull_request: {}

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup dotNet
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore test/WorkOSTests/WorkOSTests.csproj
      - name: Verify formatting
        run: |
          dotnet format src/WorkOS.net/WorkOS.net.csproj --no-restore --verify-no-changes --severity warn
          dotnet format test/WorkOSTests/WorkOSTests.csproj --no-restore --verify-no-changes --severity warn
      - name: Verify analyzers
        run: |
          dotnet build -c Release src/WorkOS.net/WorkOS.net.csproj --no-restore
          dotnet build -c Release test/WorkOSTests/WorkOSTests.csproj --no-restore
